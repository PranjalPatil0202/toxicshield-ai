<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToxicShield AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0d14;
      --bg-secondary: #0f1420;
      --bg-card: #141926;
      --bg-card-hover: #1a2030;
      --border: #1e2a3a;
      --border-bright: #2a3a52;
      --accent-cyan: #00d4ff;
      --accent-green: #00ff88;
      --accent-red: #ff3366;
      --accent-orange: #ff8c00;
      --accent-yellow: #ffd700;
      --accent-purple: #8b5cf6;
      --text-primary: #e8f0fe;
      --text-secondary: #8899aa;
      --text-dim: #4a5568;
      --toxic-red: #ff2052;
      --safe-green: #00e676;
      --warn-amber: #ffab00;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'Space Mono', monospace;
      --glow-cyan: 0 0 20px rgba(0, 212, 255, 0.3);
      --glow-red: 0 0 20px rgba(255, 32, 82, 0.4);
      --glow-green: 0 0 20px rgba(0, 230, 118, 0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-mono);
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* === LOADING SCREEN === */
    .loading-screen {
      position: fixed; inset: 0;
      background: var(--bg-primary);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
    }
    .shield-loader { text-align: center; }
    .shield-icon { font-size: 4rem; margin-bottom: 1.5rem; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
    .loading-bar { width: 240px; height: 3px; background: var(--border); border-radius: 2px; margin: 1rem auto; overflow: hidden; }
    .loading-fill { height: 100%; background: var(--accent-cyan); border-radius: 2px; animation: load 2s ease-in-out infinite; }
    @keyframes load { 0%{width:0%} 70%{width:100%} 100%{width:100%} }
    .loading-screen p { color: var(--text-secondary); font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; }

    /* === APP LAYOUT === */
    .app-layout { display: flex; min-height: 100vh; }

    /* === SIDEBAR === */
    .sidebar {
      width: 260px; min-height: 100vh;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      position: fixed; left: 0; top: 0; bottom: 0;
      z-index: 100;
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .sidebar.closed { transform: translateX(-260px); }

    .sidebar-logo {
      padding: 1.5rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.75rem;
    }
    .logo-shield { font-size: 1.5rem; filter: drop-shadow(var(--glow-cyan)); }
    .logo-text { font-family: var(--font-display); font-weight: 800; font-size: 1.1rem; color: var(--text-primary); }
    .logo-text span { color: var(--accent-cyan); }
    .logo-badge { font-size: 0.6rem; background: var(--accent-cyan); color: var(--bg-primary); padding: 0.1rem 0.4rem; border-radius: 3px; font-weight: 700; letter-spacing: 0.05em; }

    .sidebar-nav { flex: 1; padding: 1rem 0.75rem; display: flex; flex-direction: column; gap: 0.25rem; }
    .nav-section-label { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); padding: 0.75rem 0.5rem 0.25rem; }

    .nav-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.65rem 0.75rem; border-radius: 8px;
      cursor: pointer; transition: all 0.2s;
      color: var(--text-secondary); font-size: 0.85rem;
      border: 1px solid transparent;
      text-decoration: none;
    }
    .nav-item:hover { background: var(--bg-card); color: var(--text-primary); border-color: var(--border); }
    .nav-item.active { background: rgba(0,212,255,0.08); color: var(--accent-cyan); border-color: rgba(0,212,255,0.2); }
    .nav-item.active .nav-icon { filter: drop-shadow(0 0 6px var(--accent-cyan)); }
    .nav-icon { font-size: 1rem; width: 1.25rem; text-align: center; }
    .nav-label { flex: 1; }
    .nav-badge { background: var(--accent-red); color: white; font-size: 0.6rem; padding: 0.1rem 0.4rem; border-radius: 10px; font-weight: 700; }

    .sidebar-footer { padding: 1rem 0.75rem; border-top: 1px solid var(--border); }
    .user-card { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem; }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg,var(--accent-cyan),var(--accent-purple)); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: 700; }
    .user-info { flex: 1; }
    .user-name { font-size: 0.8rem; font-weight: 700; color: var(--text-primary); }
    .user-role { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; }
    .logout-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 0.8rem; padding: 0.25rem; transition: color 0.2s; }
    .logout-btn:hover { color: var(--accent-red); }

    /* === HEADER === */
    .main-content { flex: 1; margin-left: 260px; display: flex; flex-direction: column; transition: margin-left 0.3s; }
    .main-content.sidebar-open { margin-left: 260px; }

    .app-header {
      height: 60px; background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.5rem; position: sticky; top: 0; z-index: 50;
    }
    .header-left { display: flex; align-items: center; gap: 1rem; }
    .toggle-btn { background: none; border: 1px solid var(--border); color: var(--text-secondary); width: 32px; height: 32px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; transition: all 0.2s; }
    .toggle-btn:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }
    .breadcrumb { font-size: 0.75rem; color: var(--text-dim); }

    .status-bar { display: flex; align-items: center; gap: 1.25rem; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--safe-green); box-shadow: 0 0 8px var(--safe-green); animation: blink 2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .status-text { font-size: 0.7rem; color: var(--text-secondary); }

    .page-content { flex: 1; padding: 1.5rem; }

    /* === LOGIN PAGE === */
    .login-page {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--bg-primary);
      position: relative; overflow: hidden;
    }
    .login-bg { position: absolute; inset: 0; overflow: hidden; }
    .login-grid {
      position: absolute; inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px; opacity: 0.3;
    }
    .login-glow { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); width: 600px; height: 300px; background: radial-gradient(ellipse,rgba(0,212,255,0.08),transparent 70%); }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border-bright);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%; max-width: 420px;
      position: relative; z-index: 1;
      box-shadow: 0 0 60px rgba(0,0,0,0.5);
    }
    .login-logo { text-align: center; margin-bottom: 2rem; }
    .login-shield { font-size: 3rem; display: block; margin-bottom: 0.75rem; filter: drop-shadow(0 0 20px var(--accent-cyan)); }
    .login-title { font-family: var(--font-display); font-size: 1.5rem; font-weight: 800; }
    .login-title span { color: var(--accent-cyan); }
    .login-sub { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.25rem; }

    .form-group { margin-bottom: 1.25rem; }
    .form-label { font-size: 0.7rem; color: var(--text-secondary); letter-spacing: 0.1em; text-transform: uppercase; display: block; margin-bottom: 0.5rem; }
    .form-input {
      width: 100%; padding: 0.75rem 1rem;
      background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-primary);
      font-family: var(--font-mono); font-size: 0.85rem;
      transition: all 0.2s; outline: none;
    }
    .form-input:focus { border-color: var(--accent-cyan); box-shadow: 0 0 0 3px rgba(0,212,255,0.1); }
    .form-input::placeholder { color: var(--text-dim); }

    .login-btn {
      width: 100%; padding: 0.85rem;
      background: var(--accent-cyan); color: var(--bg-primary);
      border: none; border-radius: 8px;
      font-family: var(--font-display); font-weight: 700; font-size: 0.9rem;
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .login-btn:hover { background: #00bbee; box-shadow: var(--glow-cyan); transform: translateY(-1px); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .login-error { background: rgba(255,32,82,0.1); border: 1px solid rgba(255,32,82,0.3); border-radius: 8px; padding: 0.75rem; font-size: 0.8rem; color: var(--accent-red); margin-bottom: 1rem; }
    .demo-creds { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
    .demo-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.15em; text-align: center; margin-bottom: 0.75rem; }
    .demo-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .demo-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 6px; padding: 0.6rem; cursor: pointer; transition: all 0.2s; text-align: center; }
    .demo-card:hover { border-color: var(--accent-cyan); }
    .demo-card-role { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; }
    .demo-card-user { font-size: 0.75rem; color: var(--text-primary); font-weight: 700; }

    /* === CARDS === */
    .card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.25rem;
    }
    .card-title { font-family: var(--font-display); font-size: 0.85rem; font-weight: 700; color: var(--text-primary); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.05em; }

    /* === ANALYZER PAGE === */
    .analyzer-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 900px) { .analyzer-layout { grid-template-columns: 1fr; } }

    .analyzer-hero { margin-bottom: 1.5rem; }
    .page-title { font-family: var(--font-display); font-size: 1.75rem; font-weight: 800; color: var(--text-primary); }
    .page-title span { color: var(--accent-cyan); }
    .page-sub { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem; }

    .comment-input-area {
      width: 100%; min-height: 140px;
      background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: 10px; padding: 1rem;
      color: var(--text-primary); font-family: var(--font-mono); font-size: 0.9rem;
      resize: vertical; outline: none; transition: all 0.2s;
      line-height: 1.6;
    }
    .comment-input-area:focus { border-color: var(--accent-cyan); box-shadow: 0 0 0 3px rgba(0,212,255,0.08); }
    .comment-input-area::placeholder { color: var(--text-dim); }

    .input-controls { display: flex; align-items: center; justify-content: space-between; margin-top: 0.75rem; flex-wrap: gap; }
    .char-count { font-size: 0.7rem; color: var(--text-dim); }
    .lang-select { background: var(--bg-secondary); border: 1px solid var(--border); color: var(--text-secondary); padding: 0.4rem 0.75rem; border-radius: 6px; font-family: var(--font-mono); font-size: 0.75rem; outline: none; cursor: pointer; }
    .analyze-btn {
      padding: 0.6rem 1.5rem;
      background: var(--accent-cyan); color: var(--bg-primary);
      border: none; border-radius: 8px;
      font-family: var(--font-display); font-weight: 700; font-size: 0.8rem;
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em;
      text-transform: uppercase; display: flex; align-items: center; gap: 0.5rem;
    }
    .analyze-btn:hover { box-shadow: var(--glow-cyan); transform: translateY(-1px); }
    .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .analyze-btn.loading { background: var(--border-bright); }

    /* === RESULT PANEL === */
    .result-panel { display: flex; flex-direction: column; gap: 1rem; }

    .verdict-banner {
      border-radius: 10px; padding: 1.25rem;
      display: flex; align-items: center; gap: 1rem;
      border: 1px solid; position: relative; overflow: hidden;
    }
    .verdict-banner.safe { background: rgba(0,230,118,0.05); border-color: rgba(0,230,118,0.2); }
    .verdict-banner.toxic { background: rgba(255,32,82,0.05); border-color: rgba(255,32,82,0.2); }
    .verdict-banner.warning { background: rgba(255,171,0,0.05); border-color: rgba(255,171,0,0.2); }
    .verdict-icon { font-size: 2rem; }
    .verdict-label { font-family: var(--font-display); font-size: 1.1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
    .verdict-banner.safe .verdict-label { color: var(--safe-green); }
    .verdict-banner.toxic .verdict-label { color: var(--toxic-red); }
    .verdict-banner.warning .verdict-label { color: var(--warn-amber); }
    .verdict-meta { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.2rem; }
    .verdict-confidence { margin-left: auto; text-align: right; }
    .conf-value { font-family: var(--font-display); font-size: 2rem; font-weight: 800; }
    .verdict-banner.safe .conf-value { color: var(--safe-green); }
    .verdict-banner.toxic .conf-value { color: var(--toxic-red); }
    .verdict-banner.warning .conf-value { color: var(--warn-amber); }
    .conf-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; }

    /* === CATEGORY SCORES === */
    .categories-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    .category-item { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem; }
    .cat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
    .cat-name { font-size: 0.7rem; color: var(--text-secondary); text-transform: capitalize; }
    .cat-score { font-size: 0.75rem; font-weight: 700; font-family: var(--font-display); }
    .cat-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .cat-fill { height: 100%; border-radius: 2px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }

    /* === XAI SECTION === */
    .xai-tokens { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .xai-token {
      padding: 0.25rem 0.6rem; border-radius: 4px;
      font-size: 0.8rem; position: relative; cursor: default;
      transition: transform 0.15s;
    }
    .xai-token:hover { transform: scale(1.05); }
    .xai-token.high-risk { background: rgba(255,32,82,0.2); border: 1px solid rgba(255,32,82,0.4); color: var(--toxic-red); }
    .xai-token.med-risk { background: rgba(255,171,0,0.15); border: 1px solid rgba(255,171,0,0.3); color: var(--warn-amber); }
    .xai-token.low-risk { background: rgba(0,230,118,0.08); border: 1px solid rgba(0,230,118,0.2); color: var(--safe-green); }
    .xai-token.neutral { background: var(--bg-secondary); border: 1px solid var(--border); color: var(--text-secondary); }

    /* === REWRITE SECTION === */
    .rewrite-box {
      background: rgba(0,230,118,0.04); border: 1px solid rgba(0,230,118,0.15);
      border-radius: 10px; padding: 1rem;
    }
    .rewrite-label { font-size: 0.65rem; color: var(--safe-green); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.4rem; }
    .rewrite-text { font-size: 0.85rem; color: var(--text-primary); line-height: 1.6; }
    .copy-btn { background: none; border: 1px solid rgba(0,230,118,0.3); color: var(--safe-green); padding: 0.35rem 0.75rem; border-radius: 6px; font-family: var(--font-mono); font-size: 0.7rem; cursor: pointer; transition: all 0.2s; margin-top: 0.75rem; }
    .copy-btn:hover { background: rgba(0,230,118,0.1); }

    /* === DASHBOARD === */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    @media (max-width: 1100px) { .stats-grid { grid-template-columns: repeat(2,1fr); } }

    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.25rem;
      position: relative; overflow: hidden; transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: var(--border-bright); }
    .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
    .stat-card.blue::before { background: var(--accent-cyan); }
    .stat-card.red::before { background: var(--accent-red); }
    .stat-card.green::before { background: var(--accent-green); }
    .stat-card.orange::before { background: var(--accent-orange); }
    .stat-icon { font-size: 1.5rem; margin-bottom: 0.75rem; }
    .stat-value { font-family: var(--font-display); font-size: 2rem; font-weight: 800; color: var(--text-primary); }
    .stat-label { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.25rem; }
    .stat-delta { font-size: 0.7rem; margin-top: 0.5rem; }
    .stat-delta.up { color: var(--safe-green); }
    .stat-delta.down { color: var(--toxic-red); }

    .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 1rem; }
    @media (max-width: 1000px) { .charts-grid { grid-template-columns: 1fr; } }

    /* === REAL-TIME FEED === */
    .feed-list { display: flex; flex-direction: column; gap: 0.5rem; max-height: 400px; overflow-y: auto; }
    .feed-list::-webkit-scrollbar { width: 4px; }
    .feed-list::-webkit-scrollbar-track { background: var(--bg-secondary); }
    .feed-list::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

    .feed-item {
      background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.75rem 1rem;
      display: flex; align-items: flex-start; gap: 0.75rem;
      transition: all 0.2s; animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:none} }
    .feed-item:hover { border-color: var(--border-bright); }
    .feed-status { width: 8px; height: 8px; border-radius: 50%; margin-top: 0.35rem; flex-shrink: 0; }
    .feed-status.safe { background: var(--safe-green); }
    .feed-status.toxic { background: var(--toxic-red); box-shadow: 0 0 6px var(--toxic-red); }
    .feed-status.warning { background: var(--warn-amber); }
    .feed-content { flex: 1; min-width: 0; }
    .feed-text { font-size: 0.8rem; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .feed-meta { font-size: 0.65rem; color: var(--text-dim); margin-top: 0.25rem; }
    .feed-score { font-family: var(--font-display); font-size: 0.85rem; font-weight: 700; flex-shrink: 0; }
    .feed-score.safe { color: var(--safe-green); }
    .feed-score.toxic { color: var(--toxic-red); }
    .feed-score.warning { color: var(--warn-amber); }

    /* === ANALYTICS === */
    .analytics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
    @media (max-width: 900px) { .analytics-grid { grid-template-columns: 1fr; } }

    .donut-container { display: flex; align-items: center; justify-content: center; padding: 1.5rem 0; }
    .donut-legend { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1rem; }
    .legend-item { display: flex; align-items: center; gap: 0.6rem; font-size: 0.75rem; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-label { color: var(--text-secondary); flex: 1; }
    .legend-val { color: var(--text-primary); font-weight: 700; font-family: var(--font-display); }

    /* === LOGS TABLE === */
    .logs-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .logs-table th { padding: 0.75rem 1rem; background: var(--bg-secondary); text-align: left; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); border-bottom: 1px solid var(--border); font-weight: 400; }
    .logs-table td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); color: var(--text-secondary); transition: background 0.15s; vertical-align: middle; }
    .logs-table tr:hover td { background: var(--bg-card-hover); }
    .logs-table tr:last-child td { border-bottom: none; }

    .tag { display: inline-flex; align-items: center; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    .tag.safe { background: rgba(0,230,118,0.1); color: var(--safe-green); border: 1px solid rgba(0,230,118,0.2); }
    .tag.toxic { background: rgba(255,32,82,0.1); color: var(--toxic-red); border: 1px solid rgba(255,32,82,0.2); }
    .tag.blocked { background: rgba(139,92,246,0.1); color: var(--accent-purple); border: 1px solid rgba(139,92,246,0.2); }
    .tag.warning { background: rgba(255,171,0,0.1); color: var(--warn-amber); border: 1px solid rgba(255,171,0,0.2); }
    .tag.hate { background: rgba(255,140,0,0.1); color: var(--accent-orange); border: 1px solid rgba(255,140,0,0.2); }

    /* === ADMIN === */
    .admin-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .admin-tab { padding: 0.6rem 1rem; font-size: 0.8rem; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s; }
    .admin-tab.active { color: var(--accent-cyan); border-bottom-color: var(--accent-cyan); }

    .user-row { display: flex; align-items: center; gap: 1rem; padding: 0.75rem; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 0.5rem; }
    .user-row-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg,var(--accent-purple),var(--accent-cyan)); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; flex-shrink: 0; }
    .user-row-info { flex: 1; }
    .user-row-name { font-size: 0.85rem; color: var(--text-primary); }
    .user-row-email { font-size: 0.7rem; color: var(--text-dim); }
    .role-badge { font-size: 0.65rem; padding: 0.2rem 0.5rem; border-radius: 4px; font-weight: 700; }
    .role-badge.admin { background: rgba(139,92,246,0.2); color: var(--accent-purple); }
    .role-badge.user { background: rgba(0,212,255,0.1); color: var(--accent-cyan); }
    .action-btn { background: none; border: 1px solid var(--border); color: var(--text-secondary); padding: 0.3rem 0.7rem; border-radius: 6px; font-family: var(--font-mono); font-size: 0.7rem; cursor: pointer; transition: all 0.2s; }
    .action-btn:hover { border-color: var(--accent-red); color: var(--accent-red); }

    .threshold-control { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
    .threshold-label { font-size: 0.8rem; color: var(--text-secondary); width: 120px; }
    .threshold-slider { flex: 1; accent-color: var(--accent-cyan); }
    .threshold-val { font-family: var(--font-display); font-size: 0.9rem; font-weight: 700; color: var(--accent-cyan); width: 50px; text-align: right; }

    /* === CHART BARS === */
    .bar-chart { display: flex; align-items: flex-end; gap: 0.4rem; height: 120px; padding-top: 1rem; }
    .bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0.3rem; }
    .bar { width: 100%; border-radius: 4px 4px 0 0; transition: height 0.6s cubic-bezier(0.4,0,0.2,1); min-height: 4px; }
    .bar-lbl { font-size: 0.6rem; color: var(--text-dim); text-align: center; }

    /* === ALERTS === */
    .alert { border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.8rem; display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.75rem; }
    .alert.info { background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.2); color: var(--accent-cyan); }
    .alert.danger { background: rgba(255,32,82,0.08); border: 1px solid rgba(255,32,82,0.2); color: var(--toxic-red); }
    .alert.success { background: rgba(0,230,118,0.08); border: 1px solid rgba(0,230,118,0.2); color: var(--safe-green); }

    /* === WEBSOCKET INDICATOR === */
    .ws-indicator { display: flex; align-items: center; gap: 0.5rem; font-size: 0.7rem; }
    .ws-dot { width: 6px; height: 6px; border-radius: 50%; }
    .ws-dot.connected { background: var(--safe-green); animation: blink 1.5s ease-in-out infinite; }
    .ws-dot.disconnected { background: var(--toxic-red); }

    /* === SEARCH/FILTER BAR === */
    .filter-bar { display: flex; gap: 0.75rem; margin-bottom: 1.25rem; }
    .filter-input {
      flex: 1; background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.6rem 1rem; color: var(--text-primary);
      font-family: var(--font-mono); font-size: 0.8rem; outline: none; transition: border-color 0.2s;
    }
    .filter-input:focus { border-color: var(--accent-cyan); }
    .filter-select { background: var(--bg-secondary); border: 1px solid var(--border); color: var(--text-secondary); padding: 0.6rem 0.75rem; border-radius: 8px; font-family: var(--font-mono); font-size: 0.75rem; outline: none; cursor: pointer; }

    /* === SCROLLBAR === */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-secondary); }
    ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-cyan); }

    /* === SPINNER === */
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.3); border-top-color: var(--bg-primary); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* === EMPTY STATE === */
    .empty-state { text-align: center; padding: 3rem; color: var(--text-dim); }
    .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .empty-text { font-size: 0.85rem; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
