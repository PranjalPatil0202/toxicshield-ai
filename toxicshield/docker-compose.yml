version: "3.9"
services:
  mongodb:
    image: mongo:7.0
    container_name: toxicshield-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - toxicshield-net
    healthcheck:
      test: ["CMD","mongosh","--eval","db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: toxicshield-backend
    restart: unless-stopped
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - DATABASE_NAME=toxicshield
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-32-chars-min}
      - MODEL_PATH=/app/model/saved_model
      - DEBUG=false
    volumes:
      - ./model/saved_model:/app/model/saved_model:ro
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - toxicshield-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: toxicshield-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - toxicshield-net

volumes:
  mongo_data:

networks:
  toxicshield-net:
    driver: bridge
